perlmutter:
  scheduler: slurm

  default_conf:
    account: m4341_g
    constraint: "gpu"
    qos: regular
    time: "00:10:00"
    modules: 
      - "cudatoolkit/12.9"
      - "craype-accel-nvidia80"
      - "craype-hugepages2G"
      - "cray-pmi/6.1.15"

  configs:
    - name: "1_nodes__{cpus_per_task}_cpus-per-task__mpi-async"
      nodes: 1
      ntasks: 4
      gpus: 4
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=1"
    - name: "1_nodes__{cpus_per_task}_cpus-per-task"
      nodes: 1
      ntasks: 4
      gpus: 4
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=0"

    - name: "4_nodes__{cpus_per_task}_cpus-per-task__mpi-async"
      nodes: 4
      ntasks: 16
      gpus: 16
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=1"
    - name: "4_nodes__{cpus_per_task}_cpus-per-task"
      nodes: 4
      ntasks: 16
      gpus: 16
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=0"

    - name: "16_nodes__{cpus_per_task}_cpus-per-task__mpi-async"
      nodes: 16
      ntasks: 64
      gpus: 64
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=1"
    - name: "16_nodes__{cpus_per_task}_cpus-per-task"
      nodes: 16
      ntasks: 64
      gpus: 64
      cpus_per_task: "{cpus_per_task}"
      env:
        - "MPICH_ASYNC_PROGRESS=0"
